name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily
  workflow_dispatch:        # manual trigger via Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330    # 5h 30m (GitHub hard limit is 6h)

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT:          https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      # ── Repo ────────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Chrome + ChromeDriver (MATCHED PAIR — this is the key fix) ──────────
      # browser-actions/setup-chrome installs a guaranteed-matched Chrome and
      # ChromeDriver. The outputs.chromedriver-path and outputs.chrome-path are
      # passed to the scraper via env vars so uc.Chrome() uses them directly
      # instead of auto-downloading a mismatched ChromeDriver.
      - name: Install Chrome + ChromeDriver (matched)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true   # ← installs matching ChromeDriver alongside Chrome

      - name: Confirm versions match
        run: |
          echo "Chrome:      $(${{ steps.setup-chrome.outputs.chrome-path }} --version)"
          echo "ChromeDriver: $(${{ steps.setup-chrome.outputs.chromedriver-path }} --version)"

      # ── Virtual display (Chrome runs non-headless — CF detects headless) ────
      - name: Start Xvfb virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      # ── Pull existing cache from R2 so the scraper runs incrementally ───────
      - name: Download games.json and games_cache.json from R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          pip install boto3 --quiet
          python - <<'EOF'
          import boto3, os
          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ("games.json", "games_cache.json"):
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  Downloaded {key}")
              except Exception as e:
                  print(f"  {key} not found in R2 (first run?) — {e}")
          EOF

      # ── Run the scraper ──────────────────────────────────────────────────────
      - name: Run scraper
        env:
          DISPLAY:          :99
          # Pass the exact paths from setup-chrome so uc.Chrome() uses them
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          CHROME_PATH:       ${{ steps.setup-chrome.outputs.chrome-path }}
          CI:               "true"
        run: python scraper_ps4.py

      # ── Upload everything to R2 ──────────────────────────────────────────────
      - name: Upload results to R2
        if: always()   # upload even if scraper errored mid-run (partial cache is better than nothing)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python upload_to_r2.py
