name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: read

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y -qq xvfb

      # Remove any old Chromium/Chrome installs that might confuse uc
      - name: Remove old Chrome/Chromium
        run: |
          sudo apt-get remove -y --purge chromium-browser chromium google-chrome-stable 2>/dev/null || true
          sudo rm -f /usr/bin/chromium-browser /usr/bin/chromium /usr/bin/google-chrome
          echo "Done removing old Chrome/Chromium"

      # Install Chrome for Testing (stable) + matching ChromeDriver in one step.
      # This guarantees version parity — the JSON endpoint always ships both together.
      # Chrome runs NON-HEADLESS via Xvfb (already started before this step runs) —
      # Cloudflare detects headless mode, so we must use a real display.
      - name: Install Chrome for Testing + ChromeDriver (stable, non-headless)
        run: |
          # Fetch the stable channel JSON (version + download URLs)
          JSON=$(curl -sS https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json)

          # Extract Chrome + ChromeDriver linux64 URLs and version
          CHROME_URL=$(echo "$JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(x['url'] for x in d['channels']['Stable']['downloads']['chrome'] if x['platform']=='linux64'))")
          DRIVER_URL=$(echo "$JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(x['url'] for x in d['channels']['Stable']['downloads']['chromedriver'] if x['platform']=='linux64'))")
          CHROME_VER=$(echo "$JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['channels']['Stable']['version'])")
          CHROME_MAJOR=$(echo "$CHROME_VER" | cut -d. -f1)

          echo "Chrome for Testing version: $CHROME_VER (major: $CHROME_MAJOR)"

          # Install Chrome for Testing binary
          wget -q -O /tmp/chrome.zip "$CHROME_URL"
          unzip -q /tmp/chrome.zip -d /tmp/cft-chrome/
          sudo mv /tmp/cft-chrome/chrome-linux64 /opt/chrome-for-testing
          sudo chmod +x /opt/chrome-for-testing/chrome
          # Required shared libraries for Chrome for Testing on Ubuntu
          sudo apt-get install -y -qq libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2
          sudo ln -sf /opt/chrome-for-testing/chrome /usr/bin/google-chrome
          echo "Installed: $(google-chrome --version)"

          # Install matching ChromeDriver → place where undetected_chromedriver looks first
          wget -q -O /tmp/chromedriver.zip "$DRIVER_URL"
          unzip -q /tmp/chromedriver.zip -d /tmp/cft-driver/
          UC_DIR="$HOME/.local/share/undetected_chromedriver"
          mkdir -p "$UC_DIR"
          cp /tmp/cft-driver/chromedriver-linux64/chromedriver "$UC_DIR/chromedriver"
          chmod +x "$UC_DIR/chromedriver"
          echo "ChromeDriver installed: $($UC_DIR/chromedriver --version)"

          # Export the chromedriver path so scraper_ps4.py uses it directly (no auto-download)
          echo "CHROMEDRIVER_PATH=$UC_DIR/chromedriver" >> $GITHUB_ENV

      # Restore scraper cache files from R2 so the run is incremental
      - name: Restore cache from R2
        run: |
          python - <<'PYEOF'
          import os, boto3
          from pathlib import Path
          from botocore.config import Config
          from botocore.exceptions import ClientError

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      - name: Run scraper
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          DISPLAY=:99 python scraper_ps4.py
        timeout-minutes: 300

      - name: Upload to R2
        if: always()
        run: python upload_to_r2.py

      - name: Summary
        if: always()
        run: |
          echo "── games.json ────────────────────"
          wc -c games.json 2>/dev/null || echo "not found"
          echo "── games_cache.json ──────────────"
          python -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              total = len(data)
              done  = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{total} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"