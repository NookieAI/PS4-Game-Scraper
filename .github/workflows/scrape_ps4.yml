name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: read

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y -qq xvfb

      # Remove ALL old Chrome so only our version exists on this runner
      - name: Remove existing Chrome/Chromium
        run: |
          sudo apt-get remove -y --purge chromium-browser chromium google-chrome-stable 2>/dev/null || true
          sudo rm -f /usr/bin/google-chrome /usr/bin/chromium-browser /usr/bin/chromium
          sudo rm -rf ~/.local/share/undetected_chromedriver/
          echo "Cleaned old Chrome installs"

      # Install google-chrome-stable from Google's apt repo (official, always latest stable)
      - name: Install Google Chrome stable (from Google apt repo)
        run: |
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          CHROME_MAJOR=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Chrome major version: $CHROME_MAJOR"
          echo "CHROME_MAJOR=$CHROME_MAJOR" >> $GITHUB_ENV

      # Patch scraper_ps4.py to pass version_main to uc.Chrome()
      # This tells uc exactly which ChromeDriver version to download — matching Chrome
      - name: Patch scraper — pass version_main to uc.Chrome()
        run: |
          python3 - <<'PYEOF'
          from pathlib import Path
          import re, os

          src = Path("scraper_ps4.py").read_text()
          major = os.environ.get("CHROME_MAJOR", "")

          old = "driver = uc.Chrome(options=options)"
          new = f"driver = uc.Chrome(options=options, version_main={major})"

          if old in src:
              Path("scraper_ps4.py").write_text(src.replace(old, new))
              print(f"✅ Patched: uc.Chrome(options=options, version_main={major})")
          else:
              print("❌ Could not find 'driver = uc.Chrome(options=options)' in scraper_ps4.py")
              print("Searching for actual call...")
              for i, line in enumerate(src.splitlines(), 1):
                  if "uc.Chrome(" in line:
                      print(f"  Line {i}: {line.strip()}")
          PYEOF

      - name: Restore cache from R2
        run: |
          python - <<'PYEOF'
          import os, boto3
          from pathlib import Path
          from botocore.config import Config
          from botocore.exceptions import ClientError

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      - name: Run scraper
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          DISPLAY=:99 python scraper_ps4.py
        timeout-minutes: 300

      - name: Upload to R2
        if: always()
        run: python upload_to_r2.py

      - name: Summary
        if: always()
        run: |
          echo "── games.json ────────────────────"
          wc -c games.json 2>/dev/null || echo "not found"
          echo "── games_cache.json ──────────────"
          python -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              total = len(data)
              done  = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{total} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"