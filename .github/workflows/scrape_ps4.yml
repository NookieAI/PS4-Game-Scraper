name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: read

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y -qq xvfb

      # Remove ALL old Chrome/Chromium so only our version exists
      - name: Remove existing Chrome/Chromium
        run: |
          sudo apt-get remove -y --purge chromium-browser chromium google-chrome-stable 2>/dev/null || true
          sudo rm -f /usr/bin/google-chrome /usr/bin/chromium-browser /usr/bin/chromium
          sudo rm -rf ~/.local/share/undetected_chromedriver/
          echo "Cleaned old Chrome installs"

      # Install Chrome for Testing + matching ChromeDriver (same version = no mismatch ever)
      - name: Install Chrome for Testing + ChromeDriver
        run: |
          STABLE=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions.json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['channels']['Stable']['version'])")
          echo "CfT Stable version: $STABLE"
          echo "CFT_VERSION=$STABLE" >> $GITHUB_ENV

          # Chrome binary
          wget -q -O /tmp/chrome.zip "https://storage.googleapis.com/chrome-for-testing-public/${STABLE}/linux64/chrome-linux64.zip"
          sudo unzip -q /tmp/chrome.zip -d /opt/
          sudo chmod +x /opt/chrome-linux64/chrome
          sudo ln -sf /opt/chrome-linux64/chrome /usr/bin/google-chrome
          echo "Chrome: $(google-chrome --version)"

          # ChromeDriver — place in uc's cache dir so it uses it directly
          wget -q -O /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${STABLE}/linux64/chromedriver-linux64.zip"
          unzip -q /tmp/chromedriver.zip -d /tmp/
          mkdir -p ~/.local/share/undetected_chromedriver/
          cp /tmp/chromedriver-linux64/chromedriver ~/.local/share/undetected_chromedriver/chromedriver
          sudo cp /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chmod +x ~/.local/share/undetected_chromedriver/chromedriver
          echo "ChromeDriver: $(chromedriver --version)"
          echo "CHROMEDRIVER_PATH=$HOME/.local/share/undetected_chromedriver/chromedriver" >> $GITHUB_ENV

      # Patch scraper_ps4.py to pass driver_executable_path and binary_location
      # so uc.Chrome() uses exactly what we installed — no auto-download
      - name: Patch scraper to use installed Chrome + ChromeDriver
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          src = Path("scraper_ps4.py").read_text()

          # Patch 1: inject binary_location and driver_executable_path into uc.Chrome() call
          # Original: driver = uc.Chrome(options=options)
          old = 'driver = uc.Chrome(options=options)'
          new = (
              'import os as _os\n'
              '    _chrome_bin = _os.environ.get("CHROME_BINARY", "/usr/bin/google-chrome")\n'
              '    _driver_bin = _os.environ.get("CHROMEDRIVER_PATH", "")\n'
              '    options.binary_location = _chrome_bin\n'
              '    driver = uc.Chrome(\n'
              '        options=options,\n'
              '        driver_executable_path=_driver_bin if _driver_bin else None,\n'
              '        version_main=int(_chrome_bin and __import__("subprocess").check_output(\n'
              '            [_chrome_bin, "--version"], text=True).split()[2].split(".")[0]) if _driver_bin else None,\n'
              '    )'
          )
          if old in src:
              src = src.replace(old, new)
              Path("scraper_ps4.py").write_text(src)
              print("✅ Patched uc.Chrome() call")
          else:
              print("⚠️  Could not find uc.Chrome() call — applying fallback patch")
              # Fallback: monkey-patch uc at import level via sitecustomize
              sitecustom = Path("/opt/hostedtoolcache/Python/3.11.14/x64/lib/python3.11/sitecustomize.py")
              sitecustom.write_text("""
          import undetected_chromedriver as _uc
          import os as _os
          _orig_init = _uc.Chrome.__init__
          def _patched_init(self, *a, **kw):
              kw.setdefault("driver_executable_path", _os.environ.get("CHROMEDRIVER_PATH") or None)
              if not kw.get("options"):
                  kw["options"] = _uc.ChromeOptions()
              kw["options"].binary_location = _os.environ.get("CHROME_BINARY", "/usr/bin/google-chrome")
              _orig_init(self, *a, **kw)
          _uc.Chrome.__init__ = _patched_init
          """)
              print("✅ Applied sitecustomize monkey-patch")
          PYEOF

      - name: Set Chrome binary env var
        run: echo "CHROME_BINARY=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: Restore cache from R2
        run: |
          python - <<'PYEOF'
          import os, boto3
          from pathlib import Path
          from botocore.config import Config
          from botocore.exceptions import ClientError

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      - name: Run scraper
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          DISPLAY=:99 python scraper_ps4.py
        timeout-minutes: 300

      - name: Upload to R2
        if: always()
        run: python upload_to_r2.py

      - name: Summary
        if: always()
        run: |
          echo "── games.json ────────────────────"
          wc -c games.json 2>/dev/null || echo "not found"
          echo "── games_cache.json ──────────────"
          python -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              total = len(data)
              done  = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{total} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"