name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: read

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y -qq xvfb

      # ── Install Chrome + ChromeDriver from the SAME CfT Stable release ─────
      # Both binaries come from the same Google CfT release → exact version match.
      - name: Install Chrome + ChromeDriver (matched pair from CfT Stable)
        run: |
          CfT_INFO=$(curl -fsSL "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json")

          CHROME_URL=$(echo "$CfT_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          stable = data['channels']['Stable']
          for d in stable['downloads']['chrome']:
              if d['platform'] == 'linux64':
                  print(d['url'])
                  break
          ")

          DRIVER_URL=$(echo "$CfT_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          stable = data['channels']['Stable']
          for d in stable['downloads']['chromedriver']:
              if d['platform'] == 'linux64':
                  print(d['url'])
                  break
          ")

          CHROME_VERSION=$(echo "$CfT_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data['channels']['Stable']['version'])
          ")

          echo "CfT Stable version: $CHROME_VERSION"
          echo "Chrome URL:       $CHROME_URL"
          echo "ChromeDriver URL: $DRIVER_URL"

          # Install Chrome from CfT zip
          wget -q -O /tmp/chrome-linux64.zip "$CHROME_URL"
          unzip -q /tmp/chrome-linux64.zip -d /tmp/chrome-linux64/
          CHROME_BIN=$(find /tmp/chrome-linux64/ -name chrome -type f | head -1)
          sudo mv "$CHROME_BIN" /usr/local/bin/google-chrome
          sudo chmod +x /usr/local/bin/google-chrome
          # Runtime dependencies for Chrome on Ubuntu runner
          sudo apt-get install -y -qq \
            libglib2.0-0 libnss3 libfontconfig1 libxss1 \
            libxtst6 libxrandr2 libxi6 libpangocairo-1.0-0 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libasound2t64 \
            libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libvulkan1 2>/dev/null || true
          echo "Chrome installed: $(google-chrome --version)"

          # Install ChromeDriver — put it where uc looks first
          wget -q -O /tmp/chromedriver-linux64.zip "$DRIVER_URL"
          unzip -q /tmp/chromedriver-linux64.zip -d /tmp/chromedriver-linux64/
          DRIVER_BIN=$(find /tmp/chromedriver-linux64/ -name chromedriver -type f | head -1)
          UC_DIR="$HOME/.local/share/undetected_chromedriver"
          mkdir -p "$UC_DIR"
          cp "$DRIVER_BIN" "$UC_DIR/chromedriver"
          chmod +x "$UC_DIR/chromedriver"
          sudo cp "$DRIVER_BIN" /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          echo "ChromeDriver installed: $($UC_DIR/chromedriver --version)"

      - name: Verify Chrome + ChromeDriver versions match
        run: |
          echo "Chrome:      $(google-chrome --version)"
          echo "ChromeDriver: $(chromedriver --version)"

      # Restore scraper cache files from R2 so the run is incremental
      - name: Restore cache from R2
        run: |
          python - <<'PYEOF'
          import os, boto3
          from pathlib import Path
          from botocore.config import Config
          from botocore.exceptions import ClientError

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      - name: Run scraper
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          DISPLAY=:99 python scraper_ps4.py
        timeout-minutes: 300

      - name: Upload to R2
        if: always()
        run: python upload_to_r2.py

      - name: Summary
        if: always()
        run: |
          echo "── games.json ────────────────────"
          wc -c games.json 2>/dev/null || echo "not found"
          echo "── games_cache.json ──────────────"
          python -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              total = len(data)
              done  = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{total} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"