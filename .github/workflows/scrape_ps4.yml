name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    permissions:
      contents: read

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Xvfb
        run: sudo apt-get install -y -qq xvfb

      # Remove any old Chromium/Chrome installs that might confuse uc
      - name: Remove old Chrome/Chromium
        run: |
          sudo apt-get remove -y --purge chromium-browser chromium 2>/dev/null || true
          sudo rm -f /usr/bin/chromium-browser /usr/bin/chromium
          echo "Done removing old Chromium"

      # Install REAL Google Chrome Stable — NOT Chrome for Testing.
      # CfT has a different browser fingerprint that Cloudflare detects.
      # This .deb gives the same binary that ships to real users (same as Windows PC).
      - name: Install Google Chrome stable (real user binary)
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          echo "Installed: $(google-chrome --version)"

      # Download ChromeDriver that exactly matches the installed Chrome version.
      # Uses Google's CfT JSON API to find the right driver for real Chrome.
      # Places binary where undetected_chromedriver looks first (no runtime download).
      - name: Install matching ChromeDriver
        run: |
          CHROME_FULL=$(google-chrome --version | grep -oP '[\d.]+')
          CHROME_MAJOR=$(echo "$CHROME_FULL" | cut -d. -f1)
          echo "Chrome: $CHROME_FULL  (major: $CHROME_MAJOR)"

          CFT_URL="https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json"
          DRIVER_URL=$(python3 - <<PYEOF
import urllib.request, json, sys
major = "$CHROME_MAJOR"
full  = "$CHROME_FULL"
data  = json.loads(urllib.request.urlopen("$CFT_URL").read())
versions = data.get("versions", [])
best = None
for v in versions:
    if v["version"] == full:
        best = v; break
if best is None:
    for v in reversed(versions):
        if v["version"].split(".")[0] == major:
            best = v; break
if best is None:
    sys.exit(f"No ChromeDriver found for Chrome {full}")
downloads = best.get("downloads", {}).get("chromedriver", [])
for d in downloads:
    if d.get("platform") == "linux64":
        print(d["url"]); sys.exit(0)
sys.exit(f"No linux64 chromedriver in downloads for Chrome {full}")
PYEOF
          )

          echo "Downloading ChromeDriver from: $DRIVER_URL"
          wget -q -O /tmp/chromedriver.zip "$DRIVER_URL"
          unzip -q /tmp/chromedriver.zip -d /tmp/cft/
          DRIVER_BIN=$(find /tmp/cft/ -name chromedriver -type f | head -1)
          if [ -z "$DRIVER_BIN" ]; then echo "ERROR: chromedriver binary not found after unzip"; exit 1; fi

          UC_DIR="$HOME/.local/share/undetected_chromedriver"
          mkdir -p "$UC_DIR"
          cp "$DRIVER_BIN" "$UC_DIR/chromedriver"
          chmod +x "$UC_DIR/chromedriver"
          echo "ChromeDriver installed: $($UC_DIR/chromedriver --version)"

          # Verify major versions match — mismatch = scraper crash at startup
          DRIVER_MAJOR=$($UC_DIR/chromedriver --version | grep -oP '[\d]+' | head -1)
          if [ "$CHROME_MAJOR" != "$DRIVER_MAJOR" ]; then
            echo "ERROR: Chrome major $CHROME_MAJOR != ChromeDriver major $DRIVER_MAJOR"
            exit 1
          fi
          echo "✓ Version match confirmed: Chrome $CHROME_MAJOR = ChromeDriver $DRIVER_MAJOR"

          echo "CHROMEDRIVER_PATH=$UC_DIR/chromedriver" >> $GITHUB_ENV

      # Restore scraper cache files from R2 so the run is incremental
      - name: Restore cache from R2
        run: |
          python - <<'PYEOF'
          import os, boto3
          from pathlib import Path
          from botocore.config import Config
          from botocore.exceptions import ClientError

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      - name: Run scraper
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          DISPLAY=:99 python scraper_ps4.py
        timeout-minutes: 300

      - name: Upload to R2
        if: always()
        run: python upload_to_r2.py

      - name: Summary
        if: always()
        run: |
          echo "── games.json ───���────────────────"
          wc -c games.json 2>/dev/null || echo "not found"
          echo "── games_cache.json ──────────────"
          python -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              total = len(data)
              done  = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{total} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"
