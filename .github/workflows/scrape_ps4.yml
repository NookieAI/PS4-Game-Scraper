name: PS4 Scraper — Daily

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily
  workflow_dispatch:        # manual trigger via Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330    # 5h 30m (GitHub hard limit is 6h)

    env:
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET:            ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT:          https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Install Chrome stable ────────────────────────────────────────────────
      - name: Install Chrome stable
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          google-chrome --version

      # ── Install the EXACT matching ChromeDriver via Chrome for Testing API ───
      - name: Install matching ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"

          CHROMEDRIVER_INFO=$(python3 - <<PYEOF
          import urllib.request, json, sys

          chrome_ver = "$CHROME_VERSION"
          major = chrome_ver.split('.')[0]

          url = "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json"
          data = json.loads(urllib.request.urlopen(url).read())

          prefixes = [chrome_ver, '.'.join(chrome_ver.split('.')[:3])]
          match = None
          for prefix in prefixes:
              candidates = [v for v in data['versions'] if v['version'].startswith(prefix)]
              if candidates:
                  match = candidates[-1]
                  break

          if not match:
              candidates = [v for v in data['versions'] if v['version'].startswith(major + '.')]
              match = candidates[-1] if candidates else None

          if not match:
              print("ERROR: no matching ChromeDriver found", file=sys.stderr)
              sys.exit(1)

          downloads = match['downloads'].get('chromedriver', [])
          dl = next((d for d in downloads if d['platform'] == 'linux64'), None)
          if not dl:
              print("ERROR: no linux64 chromedriver download", file=sys.stderr)
              sys.exit(1)

          print(match['version'] + ' ' + dl['url'])
          PYEOF
          )

          DRIVER_VER=$(echo $CHROMEDRIVER_INFO | cut -d' ' -f1)
          DRIVER_URL=$(echo $CHROMEDRIVER_INFO | cut -d' ' -f2)
          echo "ChromeDriver version: $DRIVER_VER"
          echo "Downloading: $DRIVER_URL"

          wget -q -O /tmp/chromedriver.zip "$DRIVER_URL"
          unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver_extract
          sudo mv /tmp/chromedriver_extract/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

          echo "CHROMEDRIVER_PATH=/usr/local/bin/chromedriver" >> $GITHUB_ENV
          echo "CHROME_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      # ── PureVPN via WireGuard ────────────────────────────────────────────────
      - name: Connect to PureVPN (WireGuard)
        if: secrets.PUREVPN_WG_CONFIG != ''        
        run: |
          sudo apt-get install -y -qq wireguard-tools resolvconf
          echo "${{ secrets.PUREVPN_WG_CONFIG }}" | sudo tee /etc/wireguard/purevpn.conf > /dev/null
          sudo chmod 600 /etc/wireguard/purevpn.conf
          sudo wg-quick up purevpn
          echo "VPN connected — public IP:"
          curl -s https://api.ipify.org && echo

      # ── Virtual display (non-headless — CF detects headless) ────────────────
      - name: Start Xvfb virtual display
        run: |
          sudo apt-get install -y -qq xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      # ── Pull existing cache from R2 ──────────────────────────────────────────
      - name: Download games.json and games_cache.json from R2
        run: |
          python3 - <<'PYEOF'
          import boto3, os
          from botocore.config import Config
          from botocore.exceptions import ClientError
          from pathlib import Path

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          for key in ["games.json", "games_cache.json"]:
              try:
                  s3.download_file(bucket, key, key)
                  print(f"  restored {key}  ({Path(key).stat().st_size:,} bytes)")
              except ClientError as e:
                  if e.response["Error"]["Code"] in ("404", "NoSuchKey"):
                      print(f"  {key} not in R2 yet — starting fresh")
                  else:
                      print(f"  WARNING: could not download {key}: {e}")
          PYEOF

      # ── Run the scraper ──────────────────────────────────────────────────────
      - name: Run scraper
        env:
          CI: "true"
        run: python scraper_ps4.py

      # ── Upload everything to R2 ──────────────────────────────────────────────
      - name: Upload results to R2
        if: always()
        run: python upload_to_r2.py

      # ── Disconnect VPN ──────────────────────────────────────────────────────
      - name: Disconnect PureVPN
        if: always() && secrets.PUREVPN_WG_CONFIG != ''
        run: sudo wg-quick down purevpn 2>/dev/null || true

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "── games_cache.json ──────────────"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('games_cache.json')
          if p.exists():
              data = json.loads(p.read_text())
              done = sum(1 for e in data if not e.get('error') and e.get('releases'))
              print(f'{len(data)} entries total, {done} with releases')
          else:
              print('not found')
          " 2>/dev/null || true
          echo "── screenshots/ ──────────────────"
          find screenshots/ -type f 2>/dev/null | wc -l | xargs echo "files:"
