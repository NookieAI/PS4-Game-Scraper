name: Build PS4 Game Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v3.5.0)'
        required: true
        default: 'v3.5.0'

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (portable exe)
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          if-no-files-found: error

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Convert ico → icns
        run: |
          mkdir -p /tmp/iconbuild/icon.iconset
          sips -s format png assets/icon1.ico --out /tmp/icon_tmp.png 2>/dev/null || true
          if [ ! -s /tmp/icon_tmp.png ]; then
            python3 -c "
          import struct, zlib
          def png1x1(r,g,b):
              raw=b'\\x00'+bytes([r,g,b,255])
              def c(t,d):
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
              return b'\\x89PNG\\r\\n\\x1a\\n'+c(b'IHDR',struct.pack('>IIBBBBB',1,1,8,2,0,0,0))+c(b'IDAT',zlib.compress(b'\\x00\\x1e\\x1e\\x1e'))+c(b'IEND',b'')
          open('/tmp/icon_tmp.png','wb').write(png1x1(30,30,30))
          "
          fi
          for size in 16 32 64 128 256 512; do
            sips -z $size $size /tmp/icon_tmp.png --out /tmp/iconbuild/icon.iconset/icon_${size}x${size}.png
            double=$((size*2))
            sips -z $double $double /tmp/icon_tmp.png --out /tmp/iconbuild/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns /tmp/iconbuild/icon.iconset -o assets/icon1.icns
          echo "icns created: $(ls -lh assets/icon1.icns)"

      - name: Build macOS (dmg + zip, x64 + arm64)
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libopenjp2-tools imagemagick

      - name: Convert ico → png
        run: |
          convert assets/icon1.ico[0] -resize 512x512 assets/icon1.png 2>/dev/null || \
          python3 - <<'EOF'
          import struct, zlib
          W=H=512
          row=b'\x00'+b'\x1e\x1e\x1e\xff'*W
          raw=row*H
          def chunk(t,d):
              return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
          data=(b'\x89PNG\r\n\x1a\n'
                +chunk(b'IHDR',struct.pack('>IIBBBBB',W,H,8,2,0,0,0))
                +chunk(b'IDAT',zlib.compress(raw))
                +chunk(b'IEND',b''))
          open('assets/icon1.png','wb').write(data)
          print('fallback png written')
          EOF
          echo "png ready: $(ls -lh assets/icon1.png)"

      - name: Build Linux (AppImage + deb)
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ── Release (always runs — tag push OR manual dispatch) ───────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PS4 Game Browser ${{ steps.tag.outputs.tag }}
          files: release-files/**/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
