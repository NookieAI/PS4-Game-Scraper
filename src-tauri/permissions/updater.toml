"$schema" = "../gen/schemas/default.schema.json"

[default]
description = "Permissions for the app's built-in commands (custom updater)"
permissions = [
    "allow-check-for-updates",
    "allow-install-update",
    "allow-fetch-catalog",
    "allow-read-catalog-cache",
    "allow-write-catalog-cache",
]

[[permission]]
identifier  = "allow-check-for-updates"
description = "Allow the frontend to query GitHub for a newer release."
commands.allow = ["check_for_updates"]

[[permission]]
identifier  = "allow-install-update"
description = "Allow the frontend to download + apply a release update."
commands.allow = ["install_update"]

[[permission]]
identifier  = "allow-fetch-catalog"
description = "Allow the frontend to request the token-gated catalog JSON via Rust."
commands.allow = ["fetch_catalog"]

[[permission]]
identifier  = "allow-read-catalog-cache"
description = "Allow the frontend to read the persisted last-good catalog cache."
commands.allow = ["read_catalog_cache"]

[[permission]]
identifier  = "allow-write-catalog-cache"
description = "Allow the frontend to persist the last-good catalog cache to disk."
commands.allow = ["write_catalog_cache"]
