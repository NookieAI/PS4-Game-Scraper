      # Use the official setup-chrome action — installs matching Chrome + ChromeDriver
      # together, guaranteeing version parity. No patching needed.
      - name: Install Chrome + matching ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Verify Chrome + ChromeDriver versions match
        run: |
          echo "Chrome:      ${{ steps.setup-chrome.outputs.chrome-version }}"
          echo "ChromeDriver: $(chromedriver --version)"

      # Place ChromeDriver where uc looks first, so it never tries to download one
      - name: Lock ChromeDriver into uc cache (prevent auto-download)
        run: |
          UC_DIR="$HOME/.local/share/undetected_chromedriver"
          mkdir -p "$UC_DIR"
          cp "$(which chromedriver)" "$UC_DIR/chromedriver"
          chmod +x "$UC_DIR/chromedriver"
          echo "Locked: $($UC_DIR/chromedriver --version)"