<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS4 Game Browser</title>
  <style>
    html, body { min-height: 100vh; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #000;
      color: #f0f0f0;
    }
    .container {
      max-width: min(1920px, 98vw);
      margin: 20px auto;
      position: relative;
      min-height: 95vh;
      padding-bottom: 30px;
    }
    h1 {
      color: #fff;
      text-align: center;
      text-shadow: 0 0 15px #00d4ff;
      margin-bottom: 20px;
    }
    #status {
      margin-bottom: 15px;
      font-weight: bold;
      text-align: center;
      color: #00ff88;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #status.show { opacity: 1; }
    .button-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .search-container { flex: 1; max-width: 300px;}
    .search-container #searchInput {
      padding: 10px;
      min-width: 180px;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #555555;
      background: #333333;
      color: #fff;
    }
    .action-buttons { display: flex; gap: 10px;}
    button {
      min-width: 140px;
      padding: 5px 30px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover { background: rgba(255, 255, 255, 0.3);}
    button:disabled { background: rgba(255, 255, 255, 0.1); cursor: not-allowed;}
    #progressRow {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    #progressContainer { width: 300px; visibility:hidden;}
    .progress-bar {
      width: 100%; height: 6px; background: #333333; border-radius: 3px;
    }
    .progress-bar.indeterminate::after {
      content: '';
      display: block;
      height: 100%;
      background: linear-gradient(135deg, #00d4ff, #007bff);
      border-radius: 3px;
      animation: pulse-wiggle 6s infinite ease-in-out;
    }
    @keyframes pulse-wiggle { 0% { width: 0%; } 100% { width: 100%; }}
    #progressText { color: #ccc; font-size: 12px; visibility: hidden;}
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(100px, 8vw, 155px), 1fr));
      gap: 14px;
      margin-top: 10px;
    }
    .game-card {
      background: #333333;
      border: 1px solid #555555;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.8);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .game-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.9); border-color: #7ab8ff55; }
    .game-title {
      font-size: clamp(10px, 0.75vw, 12px);
      font-weight: bold;
      margin-top: 6px;
      color: white;
      text-align: center;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .game-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; display: block; }
    /* ── Modal overlay ── */
    .modal {
      display: none; position: fixed; z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.90); overflow-y: scroll;
    }
    .modal.open { display: block; }
    .modal-content {
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #1a1a2e 100%);
      margin: 40px auto 60px; border: 1px solid #2a3a5c;
      width: 620px; border-radius: 16px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7); overflow: hidden; position: relative;
    }
    /* ── Modal Header ── */
    .modal-header {
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 24px 18px; text-align: center;
      background: rgba(0,0,0,0.25); border-bottom: 1px solid #2a3a5c;
    }
    .modal-header .game-cover {
      width: 160px; height: 210px; object-fit: cover; border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.7); margin-bottom: 14px; flex-shrink: 0;
    }
    .modal-title-block { width: 100%; }
    .modal-title-block h2 { color: #e8f4ff; font-size: 1.22em; margin: 0 0 8px 0; line-height: 1.35; font-weight: 700; }
    #metaDetails { display: flex; flex-wrap: wrap; gap: 6px 8px; margin-bottom: 4px; justify-content: center; }
    .meta-badge { background: rgba(60,100,180,0.25); border: 1px solid rgba(100,150,255,0.2); border-radius: 5px; padding: 2px 8px; font-size: 0.78em; color: #99bbee; }
    .meta-badge b { color: #aaccff; margin-right: 3px; }
    .close {
      position: absolute; top: 12px; right: 16px;
      background: rgba(255,255,255,0.06); border: none; color: #7788aa;
      font-size: 1.4em; line-height: 1; cursor: pointer; padding: 4px 9px;
      border-radius: 6px; transition: all 0.15s; z-index: 10;
    }
    .close:hover { background: rgba(255,60,60,0.2); color: #ff8888; }
    .modal-body { padding: 16px 24px 20px; }
    .modal-screenshot-row { display: flex; gap: 10px; margin: 0 0 16px 0; flex-wrap: nowrap; width: 100%; }
    .modal-screenshot-row img { flex: 1 1 0; min-width: 0; width: 0; height: 180px; border-radius: 10px; object-fit: cover; background: #111; box-shadow: 0 4px 16px rgba(0,0,0,0.5); cursor: zoom-in; transition: transform 0.15s, box-shadow 0.15s; border: 1px solid rgba(255,255,255,0.06); }
    .modal-screenshot-row img:hover { transform: scale(1.02); box-shadow: 0 8px 28px rgba(0,0,0,0.7); border-color: rgba(100,180,255,0.3); }
    .modal-screenshot-row:empty { display: none; }
    /* Lightbox */
    #imgLightbox { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.93); align-items: center; justify-content: center; flex-direction: column; cursor: zoom-out; }
    #imgLightbox.open { display: flex; }
    #imgLightbox img { max-width: 92vw; max-height: 92vh; min-width: min(640px, 92vw); border-radius: 10px; box-shadow: 0 12px 48px rgba(0,0,0,0.9); object-fit: contain; user-select: none; }
    #imgLightbox .lb-bar { display: flex; gap: 14px; margin-top: 16px; align-items: center; }
    #imgLightbox .lb-btn { padding: 7px 22px; border-radius: 8px; border: 1px solid rgba(100,160,255,0.35); background: rgba(30,60,120,0.5); color: #b0d8ff; font-size: 0.9em; cursor: pointer; transition: all 0.15s; }
    #imgLightbox .lb-btn:hover { background: #1a6bc4; border-color: #5599ff; color: #fff; }
    #imgLightbox .lb-close { background: rgba(80,20,20,0.5); border-color: rgba(200,60,60,0.3); color: #ff9999; }
    #imgLightbox .lb-close:hover { background: rgba(180,30,30,0.7); }
    #modalDesc { margin-bottom: 16px; }
    #modalDesc p { color: #8fa8c8; font-size: 0.87em; line-height: 1.7; margin: 0 0 10px 0; }
    #modalDesc p:last-child { margin-bottom: 0; }
    /* ── Version blocks ── */
    .version-block { border: 1px solid #2a3a5c; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .version-header { background: rgba(30,50,100,0.45); padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; user-select: none; transition: background 0.15s; }
    .version-header:hover { background: rgba(40,70,140,0.55); }
    .version-title { font-size: 0.92em; font-weight: 700; color: #7ab8ff; flex: 1; }
    .version-chevron { color: #4477bb; font-size: 0.8em; transition: transform 0.2s; flex-shrink: 0; }
    .version-block.open .version-chevron { transform: rotate(180deg); }
    .version-content { display: none; padding: 12px 14px; background: rgba(0,0,0,0.18); border-top: 1px solid #1e2e4a; }
    .version-block.open .version-content { display: block; }
    .dl-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .dl-row:last-of-type { border-bottom: none; }
    .dl-row-label { font-size: 0.8em; font-weight: 700; color: #99aacc; min-width: 110px; flex-shrink: 0; line-height: 1.3; }
    .dl-mirrors { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; flex: 1; }
    .mirror-btn { display: inline-block; padding: 3px 11px; border-radius: 6px; background: rgba(40,60,120,0.5); color: #c5deff; border: 1px solid rgba(80,120,220,0.35); font-size: 0.8em; cursor: pointer; transition: all 0.15s; line-height: 1.6; font-weight: 500; }
    .mirror-btn:hover { background: #1a6bc4; border-color: #5599ff; color: #fff; }
    .version-info { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.07); display: flex; flex-wrap: wrap; gap: 8px 20px; }
    .info-pill { font-size: 0.78em; color: #7788aa; display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }
    .info-pill-icon { font-size: 1em; flex-shrink: 0; }
    .info-pill-label { color: #99aacc; font-weight: 600; flex-shrink: 0; }
    .info-pill-val { color: #b0c8e8; }
    .password-val { color: #7fe0cb !important; font-family: monospace; user-select: all; cursor: copy; letter-spacing: 0.03em; }
    .note-line { font-size: 0.78em; color: #ffe09f; margin-top: 6px; padding: 4px 8px; background: rgba(255,180,0,0.08); border-left: 2px solid rgba(255,180,0,0.3); border-radius: 3px; }
    .no-versions { color: #556677; font-size: 0.9em; text-align: center; padding: 20px; }
    @media (max-width: 768px) {
      .container { min-width: 320px; } .button-container { flex-direction: column; } .search-container { max-width: none; }
      #results { grid-template-columns: repeat(auto-fill, minmax(clamp(80px, 22vw, 110px), 1fr)); gap: 10px; }
      .modal-content { width: 97vw; border-radius: 10px; } .modal-header { padding: 16px 14px 14px; } .modal-header .game-cover { width: 110px; height: 145px; }
      .modal-body { padding: 12px 12px 16px; } .dl-row-label { min-width: 80px; } .modal-screenshot-row img { height: 110px; }
    }
    body.fixed-scrollbar { overflow: hidden; }
    /* ── Social links bar ── */
    #socialBar { display: flex; gap: 14px; align-items: center; justify-content: center; margin-bottom: 14px; }
    .social-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75em; color: #556688; text-decoration: none; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); transition: all 0.2s; cursor: pointer; }
    .social-link:hover { color: #aaccee; border-color: rgba(100,160,255,0.25); background: rgba(100,160,255,0.07); }
    .social-link.kofi:hover { color: #ff6c8a; border-color: rgba(255,108,138,0.3); background: rgba(255,108,138,0.07); }
    .social-link svg { flex-shrink: 0; opacity: 0.7; }
    .social-link:hover svg { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PS4 Game Browser</h1>
    <div id="socialBar">
      <a class="social-link kofi" id="linkKofi">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.881 8.948c-.773-4.085-4.859-4.733-4.859-4.733H0v13.89c0 .946.778 1.745 1.73 1.745h16.365c0 0 4.583-.04 5.364-4.402.281-1.527.027-3.556-1.016-5.12l.438-.028c0 0-.035-.09-.047-.24l.047-.01c-.001-.048.006-.084.006-.084l-.002-.018zm-3.68 5.56c-.515 1.545-2.044 2.012-3.06 2.012H2.717V7.162h14.268c0 0 2.613.195 3.005 2.743.18 1.17.013 2.918-.789 4.603z"/><circle cx="17.5" cy="11.5" r="1.5"/></svg>

      <a class="social-link" id="linkGithub">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>

        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        Discord
      </a>
    </div>
    <div id="status">Loading library…</div>
    <div class="button-container">
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search games...">
      </div>
      <div class="action-buttons">
        <button id="scrapeBtn">↻ Refresh</button>
        <button id="sortBtn">Sort: Title</button>
      </div>
    </div>
    <div id="progressRow">
      <div id="progressText"></div>
      <div id="progressContainer">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <!-- Game detail modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div class="modal-header">
        <img id="modalImage" class="game-cover" src="" alt="">
        <div class="modal-title-block">
          <h2 id="modalTitle"></h2>
          <div id="metaDetails"></div>
        </div>
      </div>
      <div class="modal-body">
        <div id="modalScreens"></div>
        <div id="modalDesc"></div>
        <div id="modalLinks"></div>
      </div>
    </div>
  </div>

  <!-- Full-size screenshot lightbox -->
  <div id="imgLightbox">
    <img id="lbImg" src="" alt="Screenshot">
    <div class="lb-bar">
      <button class="lb-btn" id="lbSave">&#10515; Save Image</button>
      <button class="lb-btn lb-close" id="lbClose">&#10005; Close</button>
    </div>
  </div>

  <script>
    // ─── DOM refs ────────────────────────────────────────────────────────────
    const statusEl          = document.getElementById('status');
    const startBtn          = document.getElementById('scrapeBtn');
    const sortBtn           = document.getElementById('sortBtn');
    const resultsEl         = document.getElementById('results');
    const searchInput       = document.getElementById('searchInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar       = document.getElementById('progressBar');
    const progressText      = document.getElementById('progressText');
    const modal             = document.getElementById('modal');
    const modalTitle        = document.getElementById('modalTitle');
    const modalImage        = document.getElementById('modalImage');
    const modalClose        = modal.querySelector('.close');
    const metaDetails       = document.getElementById('metaDetails');
    const modalDesc         = document.getElementById('modalDesc');
    const modalScreens      = document.getElementById('modalScreens');
    const modalLinks        = document.getElementById('modalLinks');

    // ─── State ───────────────────────────────────────────────────────────────
    let allGames     = [];
    let filteredGames = [];
    let currentGame  = null;
    let currentSort  = 'title';
    try { currentSort = localStorage.getItem('ps4SortBy') || 'title'; } catch {}

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function setAllButtonsEnabled(en) {
      startBtn.disabled  = !en;
      sortBtn.disabled   = !en;
    }

    function showStatus(msg, good = true) {
      statusEl.textContent = msg;
      statusEl.style.color = good ? '#00ff88' : '#ff3870';
      statusEl.classList.add('show');
    }

    function showProgress(msg) {
      progressContainer.style.visibility = 'visible';
      progressBar.classList.add('indeterminate');
      progressText.textContent = msg;
      progressText.style.visibility = 'visible';
    }

    function hideProgress() {
      progressContainer.style.visibility = 'hidden';
      progressBar.classList.remove('indeterminate');
      progressText.textContent = '';
      progressText.style.visibility = 'hidden';
    }

    function lockBodyScroll()   { document.body.style.overflow = 'hidden'; }
    function unlockBodyScroll() { document.body.style.overflow = ''; }

    function escH(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Sort ────────────────────────────────────────────────────────────────
    function sortGames(list) {
      if (currentSort === 'title')
        return list.slice().sort((a, b) => a.title.localeCompare(b.title, undefined, { sensitivity: 'base' }));
      return list.slice();   // 'date' = insertion order (newest first from server)
    }

    function updateSortButton() {
      sortBtn.textContent = currentSort === 'date' ? 'Sort: Title' : 'Sort: Date';
    }

    sortBtn.onclick = () => {
      if (sortBtn.disabled) return;
      currentSort = currentSort === 'date' ? 'title' : 'date';
      try { localStorage.setItem('ps4SortBy', currentSort); } catch {}
      updateSortButton();
      doSearch();
    };

    // ─── Render ──────────────────────────────────────────────────────────────
    function renderGames(list) {
      resultsEl.innerHTML = '';
      const sorted = sortGames(list);
      if (!sorted.length) {
        resultsEl.innerHTML = '<div style="grid-column:1/-1;color:#ff3870;text-align:center;">No games found.</div>';
        return;
      }
      for (const game of sorted) {
        const div = document.createElement('div');
        div.className = 'game-card';

        // image is already a fully-resolved URL (local proxy or remote CDN)
        const safeTitle = escH(game.title);
        div.innerHTML = `
          <img class="game-cover" src="${escH(game.image)}" alt="${safeTitle}" onerror="this.style.opacity=0.15;">
          <div class="game-title">${safeTitle}</div>
        `;
        div.onclick = () => showModal(game);
        resultsEl.appendChild(div);
      }
    }

    function doSearch() {
      const term = searchInput.value.trim().toLowerCase();
      filteredGames = !term
        ? allGames.slice()
        : allGames.filter(g => g.title.toLowerCase().includes(term));
      renderGames(filteredGames);
    }

    // ─── Initial data load ───────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      updateSortButton();

      // Social links
      const socialLinks = {
        linkKofi:    'https://ko-fi.com/nookie_65120',
        linkGithub:  'https://github.com/NookieAI/PS4-Game-Scraper',
        linkDiscord: 'https://discord.gg/ZW89zMbqNd',
      };
      Object.entries(socialLinks).forEach(([id, url]) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('click', e => {
          e.preventDefault();
          window.electronShell && window.electronShell.openExternal(url);
        });
      });

      showProgress('Loading library…');
      try {
        const games = await window.ps4Scraper.loadPS4GamesCache();
        if (games && games.length) {
          allGames = games.slice();
          filteredGames = allGames.slice();
          renderGames(allGames);
          showStatus(`Loaded ${allGames.length} games.`);
        } else {
          showStatus('No games found — check config.json paths.', false);
          renderGames([]);
        }
      } catch (e) {
        showStatus('Failed to load: ' + (e.message || e), false);
        renderGames([]);
      } finally {
        hideProgress();
        setAllButtonsEnabled(true);
      }
    });

    // ─── Refresh button ──────────────────────────────────────────────────────
    startBtn.onclick = async () => {
      if (startBtn.disabled) return;
      setAllButtonsEnabled(false);
      showProgress('Refreshing library…');
      showStatus('Refreshing…', true);
      try {
        const result = await window.ps4Scraper.checkNewGames();
        const games  = await window.ps4Scraper.loadPS4GamesCache();
        if (games && games.length) {
          allGames      = games.slice();
          filteredGames = allGames.slice();
          doSearch();
          showStatus(`Library refreshed — ${allGames.length} games.`);
        } else {
          showStatus('No games returned after refresh.', false);
        }
      } catch (e) {
        showStatus('Refresh failed: ' + (e.message || e), false);
      } finally {
        hideProgress();
        setAllButtonsEnabled(true);
      }
    };

    searchInput.addEventListener('input', doSearch);

    // ─── Modal ───────────────────────────────────────────────────────────────
    function closeModal() {
      modal.classList.remove('open');
      unlockBodyScroll();
    }
    modalClose.onclick = closeModal;
    window.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    async function showModal(game) {
      currentGame = game;
      lockBodyScroll();

      // Show immediately with cover — no loading delay for the image
      modalTitle.textContent = game.title || '';
      modalImage.src         = game.image || '';
      modalImage.alt         = game.title || '';
      metaDetails.innerHTML  = '';
      modalDesc.innerHTML    = '';
      modalScreens.innerHTML = '';
      modalLinks.innerHTML   = '<div style="text-align:center;color:#77aaff;padding:20px;font-size:0.9em;">Loading details…</div>';
      modal.classList.add('open');

      let data = null;
      try {
        data = await window.ps4Scraper.getGameDetails(game.url);
      } catch (e) {
        modalLinks.innerHTML = `<div style="color:#ff7777;padding:12px;">Error: ${escH(e.message || e)}</div>`;
        return;
      }

      populateModalFromData(game, data);
    }

    function openGameModal(game, data) {
      // Called after a refresh — re-populate without re-fetching
      currentGame = game;
      if (!modal.classList.contains('open')) { lockBodyScroll(); modal.classList.add('open'); }
      modalTitle.textContent = data.title || game.title || '';
      if (data.cover) modalImage.src = data.cover;
      populateModalFromData(game, data);
    }

    function populateModalFromData(game, data) {
      if (!data || data.error) {
        modalLinks.innerHTML = `<div style="color:#ff7777;padding:12px;">Failed to load: ${escH((data && data.error) || 'Unknown error')}</div>`;
        return;
      }

      // ── Cover ──
      if (data.cover) modalImage.src = data.cover;   // already a full URL

      // ── Meta badges ──
      // CUSA IDs from data.meta.cusa_ids array
      const meta = data.meta || {};
      const badges = [];
      if (meta.cusa_ids && meta.cusa_ids.length) {
        meta.cusa_ids.forEach(c => {
          const txt = [c.cusa, c.region].filter(Boolean).join(' · ');
          badges.push(`<span class="meta-badge"><b>CUSA</b> ${escH(txt)}</span>`);
        });
      }
      if (meta.language)  badges.push(`<span class="meta-badge"><b>Lang</b> ${escH(meta.language)}</span>`);
      if (meta.voice)     badges.push(`<span class="meta-badge"><b>Voice</b> ${escH(meta.voice)}</span>`);
      if (meta.subtitles) badges.push(`<span class="meta-badge"><b>Subs</b> ${escH(meta.subtitles)}</span>`);
      metaDetails.innerHTML = badges.join('');

      // ── Description ──
      modalDesc.innerHTML = '';
      if (data.description) {
        const chunks = data.description.split(/\n+/).map(s => s.trim()).filter(Boolean);
        chunks.forEach(chunk => {
          const p = document.createElement('p');
          p.textContent = chunk;
          modalDesc.appendChild(p);
        });
      }
      // Extra note (e.g. "Now co-op is available")
      if (meta.note) {
        const noteEl = document.createElement('div');
        noteEl.className = 'note-line';
        noteEl.textContent = meta.note;
        modalDesc.appendChild(noteEl);
      }

      // ── Screenshots ──
      modalScreens.innerHTML = '';
      modalScreens.style.display = '';
      if (data.screenshots && data.screenshots.length) {
        const row = document.createElement('div');
        row.className = 'modal-screenshot-row';
        data.screenshots.slice(0, 2).forEach(url => {
          const img = document.createElement('img');
          img.src   = url;    // already a full resolved URL
          img.title = 'Click to view full size';
          img.onclick = () => openLightbox(url);
          img.onerror = () => {
            img.remove();
            if (!row.querySelector('img')) { row.remove(); modalScreens.style.display = 'none'; }
          };
          row.appendChild(img);
        });
        modalScreens.appendChild(row);
      }

      // ── Version blocks (download links) ──
      const versions = Array.isArray(data.versions) ? data.versions : [];
      let linksHTML = '';

      if (versions.length > 0) {
        versions.forEach((v, idx) => {
          const header = v.header || ('Version ' + (idx + 1));
          const isOpen = idx === 0;

          let rowsHTML = '';
          (v.rows || []).forEach(row => {
            // Note-only rows (from update.notes) — render as a styled callout, not a dl-row
            if (row._note) {
              rowsHTML += `<div class="note-line">${escH(row._note)}</div>`;
              return;
            }

            // Row label colour by type
            let lc = '';
            if (/game/i.test(row.label))        lc = 'style="color:#7ddfb0"';
            else if (/update/i.test(row.label)) lc = 'style="color:#7ab8ff"';
            else if (/dlc/i.test(row.label))    lc = 'style="color:#f0a060"';

            const mirrorsHTML = (row.mirrors || []).map(m =>
              m.url
                ? `<button class="mirror-btn" data-href="${escH(m.url)}">${escH(m.text)}</button>`
                : `<span class="mirror-btn" style="opacity:0.4">${escH(m.text)}</span>`
            ).join('');

            rowsHTML += `<div class="dl-row">
              <span class="dl-row-label" ${lc}>${escH(row.label)}</span>
              <div class="dl-mirrors">${mirrorsHTML}</div>
            </div>`;
          });

          // Info pills (password etc.)
          let infoPills = '';
          if (v.password) {
            infoPills += `<div class="info-pill">
              <span class="info-pill-icon">🔑</span>
              <span class="info-pill-label">Password</span>
              <span class="info-pill-val password-val" title="Click to copy"
                    onclick="navigator.clipboard.writeText(this.textContent)">${escH(v.password)}</span>
            </div>`;
          }
          const infoSection = infoPills ? `<div class="version-info">${infoPills}</div>` : '';
          const noteSection = v.note ? `<div class="note-line">${escH(v.note)}</div>` : '';

          linksHTML += `<div class="version-block ${isOpen ? 'open' : ''}">
            <div class="version-header">
              <span class="version-title">${escH(header)}</span>
              <span class="version-chevron">&#9660;</span>
            </div>
            <div class="version-content">${rowsHTML}${infoSection}${noteSection}</div>
          </div>`;
        });
      } else {
        linksHTML = '<div class="no-versions">No download links found.</div>';
      }

      modalLinks.innerHTML = linksHTML;

      // Refresh bar (re-fetch from disk/server)
      const ts = data._links_fetched ? new Date(data._links_fetched).toLocaleString() : 'unknown';
      const refreshBar = document.createElement('div');
      refreshBar.style.cssText = 'display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.07);font-size:0.75em;color:#667799;';
      refreshBar.innerHTML = `<span>Loaded: ${escH(ts)}</span>
        <button id="refreshLinksBtn" style="padding:3px 10px;border-radius:6px;background:rgba(30,60,120,0.6);color:#99ccff;border:1px solid rgba(80,130,220,0.4);cursor:pointer;font-size:1em;">↻ Reload</button>`;
      modalLinks.appendChild(refreshBar);

      document.getElementById('refreshLinksBtn').onclick = async () => {
        refreshBar.innerHTML = '<span style="color:#aabbcc;">Reloading…</span>';
        try {
          const fresh = await window.ps4Scraper.refreshGameDetails(currentGame.url);
          if (fresh && !fresh.error) openGameModal(currentGame, fresh);
          else throw new Error(fresh && fresh.error ? fresh.error : 'Unknown error');
        } catch (e) {
          refreshBar.innerHTML = `<span style="color:#ff6666;">Reload failed: ${escH(e.message)}</span>`;
        }
      };

      // Collapsible toggle
      modalLinks.querySelectorAll('.version-header').forEach(hdr => {
        hdr.onclick = () => hdr.closest('.version-block').classList.toggle('open');
      });

      // Wire download buttons → open in system browser
      modalLinks.querySelectorAll('[data-href]').forEach(btn => {
        btn.onclick = e => {
          e.stopPropagation();
          e.preventDefault();
          const url = btn.getAttribute('data-href');
          if (url && window.electronShell) window.electronShell.openExternal(url);
        };
      });
    }

    // ─── Lightbox ────────────────────────────────────────────────────────────
    const lightbox = document.getElementById('imgLightbox');
    const lbImg    = document.getElementById('lbImg');
    const lbSave   = document.getElementById('lbSave');
    const lbClose  = document.getElementById('lbClose');

    function openLightbox(url) {
      lbImg.src = url;
      lightbox.classList.add('open');
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImg.src = '';
    }

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    lbClose.addEventListener('click',  e => { e.stopPropagation(); closeLightbox(); });

    lbSave.addEventListener('click', e => {
      e.stopPropagation();
      const a = document.createElement('a');
      a.href = lbImg.src;
      const parts = lbImg.src.split('/');
      a.download = parts[parts.length - 1].split('?')[0] || 'screenshot.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (lightbox.classList.contains('open')) { e.stopPropagation(); closeLightbox(); }
      else if (modal.classList.contains('open')) closeModal();
    });
  </script>
</body>
</html>
